<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Los Santos Police</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0f;
  --surface: #16161a;
  --surface2: #1e1e24;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f0f2;
  --text2: #a0a0b0;
  --text3: #606070;
  --accent: #4f8ef7;
  --accent2: #3a7ae0;
  --success: #34d399;
  --warning: #fbbf24;
  --danger: #f87171;
  --gold: #e2b96f;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

/* Auth screen */
#auth-screen {
  display: flex; align-items: center; justify-content: center;
  height: 100vh; background: var(--bg);
  background-image: radial-gradient(ellipse at 30% 20%, rgba(79,142,247,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 80%, rgba(79,142,247,0.04) 0%, transparent 60%);
}
.auth-card {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 16px; padding: 40px; width: 400px; max-width: 95vw;
}
.auth-logo { text-align: center; margin-bottom: 28px; }
.auth-logo .shield { font-size: 2.5rem; margin-bottom: 8px; }
.auth-logo h1 { font-family: 'Rajdhani', sans-serif; font-size: 1.6rem; font-weight: 700; letter-spacing: 3px; color: var(--text); }
.auth-logo p { font-size: 0.75rem; color: var(--text3); letter-spacing: 2px; margin-top: 4px; }

/* Role picker */
.role-picker { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.role-opt {
  display: flex; align-items: center; gap: 12px;
  background: var(--bg); border: 1px solid var(--border2); border-radius: 10px;
  padding: 12px 14px; cursor: pointer; transition: all 0.2s;
}
.role-opt:hover { border-color: var(--accent); }
.role-opt.selected { border-color: var(--accent); background: rgba(79,142,247,0.08); }
.role-opt .r-icon { font-size: 1.4rem; }
.role-opt .r-txt { display: flex; flex-direction: column; }
.role-opt .r-name { font-size: 0.9rem; font-weight: 600; color: var(--text); }
.role-opt .r-desc { font-size: 0.7rem; color: var(--text3); margin-top: 2px; }

.field { margin-bottom: 16px; }
.field label { display: block; font-size: 0.75rem; font-weight: 500; color: var(--text2); margin-bottom: 6px; letter-spacing: 0.5px; }
.field input {
  width: 100%; background: var(--bg); border: 1px solid var(--border2);
  border-radius: 8px; padding: 10px 14px; color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 0.85rem; outline: none; transition: border-color 0.2s;
}
.field input:focus { border-color: var(--accent); }
.btn-primary {
  width: 100%; background: var(--accent); border: none; border-radius: 8px;
  padding: 11px; color: #fff; font-family: 'Inter', sans-serif; font-weight: 600;
  font-size: 0.88rem; cursor: pointer; transition: all 0.2s; margin-top: 4px;
}
.btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
.auth-error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); border-radius: 7px; padding: 10px 14px; font-size: 0.78rem; color: var(--danger); margin-bottom: 14px; display: none; }

/* Main app */
#app { display: none; flex-direction: column; height: 100vh; }
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 56px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.header-logo { font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 700; letter-spacing: 3px; color: var(--text); }
.header-logo span { color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-role { font-size: 0.7rem; font-weight: 600; padding: 3px 10px; border-radius: 10px; }
.role-cadet { background: rgba(56,189,248,0.15); color: #38bdf8; }
.role-fto { background: rgba(165,148,249,0.15); color: #a594f9; }
.role-command { background: rgba(251,191,36,0.15); color: var(--warning); }
.btn-logout { background: none; border: 1px solid var(--border2); border-radius: 6px; padding: 4px 12px; color: var(--text2); font-size: 0.75rem; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; }
.btn-logout:hover { border-color: var(--danger); color: var(--danger); }

/* Content */
#content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

/* Category screen */
#role-screen {
  display: none; align-items: center; justify-content: center;
  flex: 1; flex-direction: column;
  background-image: radial-gradient(ellipse at 50% 30%, rgba(79,142,247,0.05) 0%, transparent 60%);
  position: relative; overflow: hidden;
}
#role-screen.with-roster { flex-direction: row; align-items: stretch; justify-content: center; overflow: hidden; }
#role-screen.with-roster .role-main { flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 24px; min-width: 0; }
.role-main { display: flex; flex-direction: column; align-items: center; justify-content: center; }
#role-screen::before { content: '🛡️'; position: absolute; font-size: 400px; opacity: 0.02; top: 50%; left: 50%; transform: translate(-50%,-55%); pointer-events: none; }
.role-title { text-align: center; margin-bottom: 32px; position: relative; z-index: 1; }
.role-title p { font-size: 0.72rem; color: var(--text3); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; }
.role-title h2 { font-family: 'Rajdhani', sans-serif; font-size: 1.8rem; font-weight: 700; color: var(--text); }
.role-divider { width: 48px; height: 1px; background: linear-gradient(90deg,transparent,var(--accent),transparent); margin: 12px auto 32px; }
.cards-grid { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; position: relative; z-index: 1; max-width: 900px; }
.portal-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 28px 24px; width: 180px; text-align: center;
  cursor: pointer; transition: all 0.2s ease; position: relative; overflow: hidden;
}
.portal-card::after { content: ''; position: absolute; inset: 0; opacity: 0; transition: opacity 0.2s; background: radial-gradient(ellipse at 50% 0%, var(--card-glow, rgba(79,142,247,0.15)), transparent 70%); }
.portal-card:hover { transform: translateY(-3px); border-color: var(--card-color, var(--accent)); box-shadow: 0 0 20px var(--card-glow, rgba(79,142,247,0.2)); }
.portal-card:hover::after { opacity: 1; }
.portal-card .ci { font-size: 2.4rem; margin-bottom: 12px; display: block; transition: transform 0.2s; }
.portal-card:hover .ci { transform: scale(1.1); }
.portal-card .cn { font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 1px; }
.portal-card .cd { font-size: 0.68rem; color: var(--text3); margin-top: 5px; }

/* Portal screen */
#portal-screen { display: none; flex-direction: column; flex: 1; }
.portal-topbar { display: flex; align-items: center; gap: 12px; padding: 10px 20px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.portal-back { background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; padding: 5px 14px; color: var(--text2); font-size: 0.78rem; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; }
.portal-back:hover { color: var(--text); }
.portal-name { font-size: 0.82rem; color: var(--text3); }
.portal-iframe { flex: 1; border: none; width: 100%; }

/* Mouse glow */
#glow-canvas { position: fixed; inset: 0; pointer-events: none; z-index: -1; }

/* ── History screen ── */
#history-screen { display:none; flex-direction:column; flex:1; overflow:hidden; }
.hist-controls { display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  padding:16px 24px 12px; border-bottom:1px solid var(--border); }
.hist-tabs { display:flex; gap:6px; flex-wrap:wrap; flex:1; }
.hist-tab { background:var(--surface); border:1px solid var(--border); color:var(--text3);
  border-radius:7px; padding:7px 12px; font-family:'Inter',sans-serif; font-size:0.76rem;
  cursor:pointer; transition:all .18s; white-space:nowrap; }
.hist-tab:hover { color:var(--text2); border-color:var(--accent); }
.hist-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600; }
.hist-search { background:var(--surface); border:1px solid var(--border); border-radius:7px;
  padding:8px 12px; color:var(--text); font-family:'Inter',sans-serif; font-size:0.8rem;
  min-width:200px; outline:none; }
.hist-search:focus { border-color:var(--accent); }
.hist-stats { display:flex; gap:10px; padding:12px 24px; flex-wrap:wrap; }
.hist-stat { background:var(--surface); border:1px solid var(--border); border-radius:8px;
  padding:8px 14px; display:flex; align-items:center; gap:8px; }
.hist-stat .hs-n { font-family:'Rajdhani',sans-serif; font-size:1.15rem; font-weight:700; color:var(--text); }
.hist-stat .hs-l { font-size:0.68rem; color:var(--text3); letter-spacing:1px; text-transform:uppercase; }
.hist-body { flex:1; overflow-y:auto; padding:4px 24px 24px; }
.hist-row { display:flex; align-items:center; gap:14px; background:var(--surface);
  border:1px solid var(--border); border-radius:9px; padding:12px 16px; margin-bottom:8px;
  transition:border-color .18s; }
.hist-row:hover { border-color:var(--accent); }
.hist-row .hr-type { font-size:1.15rem; width:26px; text-align:center; flex-shrink:0; }
.hist-row .hr-main { flex:1; min-width:0; text-align:right; }
.hist-row .hr-name { font-weight:700; font-size:0.9rem; color:var(--text);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.hist-row .hr-meta { font-size:0.72rem; color:var(--text3); margin-top:3px; }
.hist-row .hr-score { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:1.15rem;
  min-width:56px; text-align:center; flex-shrink:0; }
.hist-row .hr-badge { font-size:0.7rem; font-weight:700; padding:4px 10px; border-radius:20px; flex-shrink:0; }
.hr-pass { background:rgba(52,211,153,0.14); color:#34d399; }
.hr-fail { background:rgba(248,113,113,0.14); color:#f87171; }
.hist-empty { text-align:center; color:var(--text3); font-size:0.85rem; padding:48px 20px; }
.hist-date { font-size:0.7rem; color:var(--text3); white-space:nowrap; flex-shrink:0; }
@media (max-width:640px){
  .hist-row .hr-date, .hist-row .hr-meta { display:none; }
  .hist-controls { padding:12px 14px; }
  .hist-body { padding:4px 14px 20px; }
}

/* ── Detail modal ── */
#det-overlay { display:none; position:fixed; inset:0; background:rgba(2,6,15,0.78);
  backdrop-filter:blur(3px); z-index:200; align-items:center; justify-content:center; padding:20px; }
#det-overlay.open { display:flex; }
.det-modal { background:var(--bg2,#0f1621); border:1px solid var(--border); border-radius:14px;
  width:100%; max-width:820px; max-height:86vh; display:flex; flex-direction:column; overflow:hidden;
  box-shadow:0 24px 70px rgba(0,0,0,0.6); }
.det-head { display:flex; align-items:center; gap:14px; padding:16px 20px;
  border-bottom:1px solid var(--border); background:var(--surface); }
.det-head-txt { flex:1; min-width:0; text-align:right; }
.det-title { font-family:'Rajdhani',sans-serif; font-size:1.2rem; font-weight:700; color:var(--text); }
.det-sub { font-size:0.74rem; color:var(--text3); margin-top:2px; }
.det-score { font-family:'Rajdhani',sans-serif; font-size:1.5rem; font-weight:700; flex-shrink:0; }
.det-close { background:transparent; border:1px solid var(--border); color:var(--text3);
  width:30px; height:30px; border-radius:7px; cursor:pointer; font-size:0.85rem; flex-shrink:0; }
.det-close:hover { color:var(--text); border-color:var(--accent); }
.det-body { overflow-y:auto; padding:16px 20px 22px; }
.det-sec { margin-bottom:18px; }
.det-sec-h { font-size:0.72rem; color:var(--text3); letter-spacing:2px; text-transform:uppercase;
  margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid var(--border); }
.det-q { background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--border);
  border-radius:8px; padding:10px 12px; margin-bottom:7px; text-align:right; }
.det-q.ok   { border-left-color:#34d399; }
.det-q.bad  { border-left-color:#f87171; }
.det-q.mid  { border-left-color:#fbbf24; }
.det-q-top { display:flex; align-items:center; gap:8px; }
.det-q-txt { flex:1; font-size:0.84rem; font-weight:600; color:var(--text); }
.det-q-tag { font-size:0.68rem; font-weight:700; padding:3px 8px; border-radius:20px; flex-shrink:0; }
.tag-ok  { background:rgba(52,211,153,0.14); color:#34d399; }
.tag-bad { background:rgba(248,113,113,0.14); color:#f87171; }
.tag-mid { background:rgba(251,191,36,0.14); color:#fbbf24; }
.tag-na  { background:rgba(148,163,184,0.12); color:var(--text3); }
.det-ans { font-size:0.78rem; margin-top:6px; line-height:1.55; }
.det-ans .lbl { color:var(--text3); }
.det-ans.given-bad { color:#f87171; }
.det-ans.given-ok  { color:#34d399; }
.det-ans.correct   { color:#34d399; }
.det-note { font-size:0.76rem; color:var(--text2); background:rgba(148,163,184,0.07);
  border-radius:6px; padding:6px 9px; margin-top:6px; line-height:1.5; white-space:pre-wrap; }
.det-crit { font-size:0.68rem; color:#f87171; font-weight:700; margin-right:6px; }
.det-kv { display:flex; justify-content:space-between; gap:10px; background:var(--surface);
  border:1px solid var(--border); border-radius:7px; padding:8px 12px; margin-bottom:6px; }
.det-kv .k { font-size:0.8rem; color:var(--text2); }
.det-kv .v { font-size:0.8rem; font-weight:700; color:var(--text); }
.det-text { background:var(--surface); border:1px solid var(--border); border-radius:8px;
  padding:10px 12px; margin-bottom:7px; text-align:right; }
.det-text .k { font-size:0.72rem; color:var(--text3); margin-bottom:4px; }
.det-text .v { font-size:0.82rem; color:var(--text); line-height:1.6; white-space:pre-wrap; }
.hist-row { cursor:pointer; }
.det-none { color:var(--text3); font-size:0.82rem; text-align:center; padding:26px; }

/* ── Roster ── */
#roster-screen { display:none; flex-direction:column; flex:1; overflow:hidden; }
.roster-save { margin-inline-start:auto; font-size:0.72rem; color:var(--text3); }
.roster-save.saving { color:#fbbf24; }
.roster-save.saved  { color:#34d399; }
.roster-body { flex:1; overflow-y:auto; padding:18px 24px 28px; }
.roster-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:22px; }
@media (max-width:760px){ .roster-grid { grid-template-columns:1fr; } }
.roster-col { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 16px; }
.roster-col h3 { font-family:'Rajdhani',sans-serif; font-size:1rem; font-weight:700; color:var(--text);
  margin:0 0 10px; display:flex; align-items:center; gap:8px; }
.roster-col h3 .cnt { font-size:0.7rem; color:var(--text3); background:var(--bg2,#0f1621);
  border:1px solid var(--border); border-radius:20px; padding:2px 9px; margin-inline-start:auto; }
.name-list { display:flex; flex-direction:column; gap:6px; margin-bottom:10px; max-height:280px; overflow-y:auto; }
.name-item { display:flex; align-items:center; gap:8px; background:var(--bg2,#0f1621);
  border:1px solid var(--border); border-radius:7px; padding:8px 10px; }
.name-item .nm { flex:1; font-size:0.85rem; color:var(--text); text-align:right;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.name-item .badge2 { font-size:0.66rem; color:var(--text3); background:var(--surface);
  border:1px solid var(--border); border-radius:20px; padding:2px 8px; }
.name-item .del { background:transparent; border:none; color:var(--text3); cursor:pointer;
  font-size:0.9rem; padding:2px 5px; border-radius:5px; flex-shrink:0; }
.name-item .del:hover { color:#f87171; background:rgba(248,113,113,0.1); }
.name-add { display:flex; gap:6px; }
.name-add input { flex:1; background:var(--bg2,#0f1621); border:1px solid var(--border);
  border-radius:7px; padding:8px 10px; color:var(--text); font-size:0.82rem; outline:none; }
.name-add input:focus { border-color:var(--accent); }
.name-add button { background:var(--accent); border:none; color:#fff; border-radius:7px;
  padding:0 14px; font-size:0.8rem; font-weight:600; cursor:pointer; }
.name-add button:hover { filter:brightness(1.1); }
.roster-empty-col { font-size:0.78rem; color:var(--text3); text-align:center; padding:16px; }

.assign-h { font-family:'Rajdhani',sans-serif; font-size:1.05rem; font-weight:700; color:var(--text);
  margin:6px 0 12px; padding-bottom:8px; border-bottom:1px solid var(--border); }
.assign-table { display:flex; flex-direction:column; gap:8px; }
.assign-row { display:flex; align-items:center; gap:12px; background:var(--surface);
  border:1px solid var(--border); border-radius:10px; padding:12px 14px; }
.assign-fto { width:190px; flex-shrink:0; text-align:right; }
.assign-fto .afn { font-weight:700; font-size:0.9rem; color:var(--text);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.assign-fto .afc { font-size:0.68rem; color:var(--text3); margin-top:2px; }
.assign-slots { flex:1; display:flex; gap:8px; flex-wrap:wrap; }
.slot { display:flex; align-items:center; gap:6px; background:var(--bg2,#0f1621);
  border:1px solid var(--border); border-radius:20px; padding:5px 6px 5px 12px; font-size:0.8rem; color:var(--text); }
.slot .sx { background:transparent; border:none; color:var(--text3); cursor:pointer;
  font-size:0.85rem; padding:0 3px; border-radius:50%; }
.slot .sx:hover { color:#f87171; }
.slot-add { background:transparent; border:1px dashed var(--border); color:var(--text3);
  border-radius:20px; padding:6px 12px; font-size:0.78rem; cursor:pointer; }
.slot-add:hover { border-color:var(--accent); color:var(--accent); }
.slot-full { font-size:0.72rem; color:var(--text3); padding:6px 4px; }
.assign-picker { position:relative; }
.picker-menu { position:absolute; z-index:20; top:calc(100% + 4px); right:0; min-width:200px;
  background:var(--bg2,#0f1621); border:1px solid var(--border); border-radius:9px; padding:6px;
  box-shadow:0 12px 34px rgba(0,0,0,0.5); max-height:240px; overflow-y:auto; }
.picker-menu button { display:block; width:100%; text-align:right; background:transparent; border:none;
  color:var(--text); padding:8px 10px; border-radius:6px; font-size:0.82rem; cursor:pointer; }
.picker-menu button:hover { background:var(--surface); }
.picker-menu .pk-empty { color:var(--text3); font-size:0.76rem; padding:8px 10px; text-align:center; }

/* FTO read-only view */
.myr-hero { text-align:center; padding:10px 0 20px; }
.myr-hero .mh-ic { font-size:2.4rem; }
.myr-hero .mh-name { font-family:'Rajdhani',sans-serif; font-size:1.3rem; font-weight:700; color:var(--text); margin-top:4px; }
.myr-cadets { display:flex; flex-direction:column; gap:10px; max-width:520px; margin:0 auto; }
.myr-cadet { display:flex; align-items:center; gap:14px; background:var(--surface);
  border:1px solid var(--border); border-inline-start:3px solid #f0883e; border-radius:10px; padding:14px 16px; }
.myr-cadet .mc-ic { font-size:1.5rem; }
.myr-cadet .mc-name { font-weight:700; font-size:0.95rem; color:var(--text); }
.myr-cadet .mc-sub { font-size:0.72rem; color:var(--text3); margin-top:2px; }
.myr-none { text-align:center; color:var(--text3); font-size:0.86rem; padding:40px 20px; }
.myr-pick { max-width:420px; margin:0 auto; }
.myr-pick label { display:block; font-size:0.8rem; color:var(--text2); margin-bottom:8px; text-align:center; }
.myr-pick select { width:100%; background:var(--surface); border:1px solid var(--border);
  border-radius:9px; padding:11px 12px; color:var(--text); font-size:0.9rem; outline:none; }
.myr-pick select:focus { border-color:var(--accent); }
.myr-switch { display:block; margin:14px auto 0; background:transparent; border:none;
  color:var(--text3); font-size:0.76rem; cursor:pointer; }
.myr-switch:hover { color:var(--text2); }

/* ── Roster (v2: FTO-only, free-text cadets) ── */
.roster-topbar { display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:20px; }
.name-add-wide { flex:1; min-width:240px; }
.roster-count { font-size:0.76rem; color:var(--text3); background:var(--surface);
  border:1px solid var(--border); border-radius:20px; padding:5px 12px; }
.fto-name-edit { background:transparent; border:1px solid transparent; border-radius:6px;
  font-family:'Rajdhani',sans-serif; font-weight:700; font-size:0.95rem; color:var(--text);

<script>//<![CDATA[

var PASSWORDS   = { command: '2143', fto: '1010', cadet: null };
var ROLE_LABELS = { command: 'פיקוד', fto: 'FTO', cadet: 'קאדט' };

var PORTALS = {
  cadet: [
    { icon:'📖', name:'נהלים ובחינה', desc:'לימוד עצמי + בחינה אמריקאית', color:'#58a6ff', glow:'rgba(88,166,255,0.2)', file:'cadet_study.html' },
    { icon:'📋', name:'דיווח הערכת FTO', desc:'lspd_cadet_feedback_portal', color:'#34d399', glow:'rgba(52,211,153,0.2)', file:'lspd_cadet_feedback_portal.html' }
  ],
  fto: [
    { icon:'📚', name:'מבחן נהלים', desc:'PRRP PD', color:'#f87171', glow:'rgba(248,113,113,0.2)', file:'prrp_pd.html' },
    { icon:'🏅', name:'מבחן הסמכה FTO', desc:'lspd_fto_exam_portal', color:'#fbbf24', glow:'rgba(251,191,36,0.2)', file:'lspd_fto_exam_portal.html' },
    { icon:'📝', name:'דיווח הערכת קאדט', desc:'lspd_fto_evaluation_portal', color:'#a594f9', glow:'rgba(165,148,249,0.2)', file:'lspd_fto_evaluation_portal.html' }
  ],
  command: [
    { icon:'📚', name:'מבחן נהלים', desc:'PRRP PD', color:'#f87171', glow:'rgba(248,113,113,0.2)', file:'prrp_pd.html' },
    { icon:'🏅', name:'מבחן הסמכה FTO', desc:'lspd_fto_exam_portal', color:'#fbbf24', glow:'rgba(251,191,36,0.2)', file:'lspd_fto_exam_portal.html' },
    { icon:'📝', name:'דיווח הערכת קאדט', desc:'lspd_fto_evaluation_portal', color:'#a594f9', glow:'rgba(165,148,249,0.2)', file:'lspd_fto_evaluation_portal.html' },
    { icon:'📋', name:'דיווח הערכת FTO', desc:'lspd_cadet_feedback_portal', color:'#34d399', glow:'rgba(52,211,153,0.2)', file:'lspd_cadet_feedback_portal.html' },
    { icon:'⏱️', name:'מחשבון מערכת שעות', desc:'lspd_tracker', color:'#38bdf8', glow:'rgba(56,189,248,0.2)', file:'lspd_tracker_v4_0.html' },
    { id:'history', icon:'📊', name:'היסטוריית הגשות', desc:'כל המבחנים והדוחות', color:'#e2b96f', glow:'rgba(226,185,111,0.2)', file:null },
    { id:'roster', icon:'🗂️', name:'ניהול רוסטר', desc:'שיבוץ חניכים למדריכים', color:'#f0883e', glow:'rgba(240,136,62,0.2)', file:null }
  ]
};

// ── FIREBASE ──────────────────────────────────────────────────────────────────
var firebaseConfig = {
  apiKey: "AIzaSyAMOihHnXa-j9X8dVSqRoREUauVd6Hh8TA",
  authDomain: "pr-rp-polic.firebaseapp.com",
  projectId: "pr-rp-polic",
  storageBucket: "pr-rp-polic.firebasestorage.app",
  messagingSenderId: "364977141598",
  appId: "1:364977141598:web:861a4ff22fe8e6b28681cf"
};
var db = null;
try {
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
} catch(e) { console.warn('firebase init failed', e); }

var TYPE_META = {
  prrp_pd:        { icon:'📚', label:'מבחן נהלים',     subjLabel:'נבחן',  byLabel:'בוחן' },
  fto_exam:       { icon:'🏅', label:'מבחן הסמכה FTO', subjLabel:'מועמד', byLabel:'בוחן' },
  fto_eval:       { icon:'📝', label:'הערכת קאדט',     subjLabel:'קאדט',  byLabel:'FTO' },
  cadet_feedback: { icon:'📋', label:'הערכת FTO',      subjLabel:'FTO',   byLabel:'קאדט' }
};

var histData = [];
var histType = 'all';
var histLoaded = false;
var histFiltered = [];

var selectedRole = null;
var currentRole  = null;

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function selectRole(role) {
  selectedRole = role;
  document.querySelectorAll('.role-opt').forEach(function(el) {
    el.classList.toggle('selected', el.getAttribute('data-role') === role);
  });
  var needsPw = !!PASSWORDS[role];
  document.getElementById('pw-field').style.display = needsPw ? 'block' : 'none';
  document.getElementById('l-password').value = '';
  document.getElementById('auth-error').style.display = 'none';
  if (needsPw) document.getElementById('l-password').focus();
}

function showAuthError(msg) {
  var el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}

function doLogin() {
  if (!selectedRole) { showAuthError('בחר דרגה'); return; }
  var needed = PASSWORDS[selectedRole];
  if (needed) {
    var pw = document.getElementById('l-password').value.trim();
    if (!pw) { showAuthError('נא להזין סיסמה'); return; }
    if (pw !== needed) { showAuthError('סיסמה שגויה'); return; }
  }
  localStorage.setItem('lspd_role', selectedRole);
  enterApp(selectedRole);
}

function enterApp(role) {
  currentRole = role;
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  var badge = document.getElementById('header-role-badge');
  badge.textContent = ROLE_LABELS[role] || role;
  badge.className = 'header-role role-' + role;
  showRoleScreen();
}

function doLogout() {
  localStorage.removeItem('lspd_role');
  currentRole = null;
  selectedRole = null;
  document.querySelectorAll('.role-opt').forEach(function(el){ el.classList.remove('selected'); });
  document.getElementById('pw-field').style.display = 'none';
  document.getElementById('l-password').value = '';
  document.getElementById('auth-error').style.display = 'none';
  document.getElementById('portal-iframe').src = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

// Restore session
document.addEventListener('DOMContentLoaded', function() {
  var role = localStorage.getItem('lspd_role');
  if (role && PORTALS[role]) enterApp(role);
});

// ── SCREENS ───────────────────────────────────────────────────────────────────
function showScreen(id) {
  ['role-screen','portal-screen','history-screen','roster-screen'].forEach(function(s){
    var el = document.getElementById(s);
    el.style.display = 'none';
    el.style.flexDirection = '';
  });
  var target = document.getElementById(id);
  target.style.display = 'flex';
  if (id !== 'portal-screen') target.style.flexDirection = 'column';
}

function showRoleScreen() {
  showScreen('role-screen');
  buildPortalCards();
  setupHomeRoster();
}

function setupHomeRoster() {
  var screen = document.getElementById('role-screen');
  var show = (currentRole === 'fto');
  screen.classList.toggle('with-roster', show);
  // showScreen sets flex-direction:column inline; clear it so the side-panel row layout can apply
  screen.style.flexDirection = show ? 'row' : '';
  if (!show) return;

  var body = document.getElementById('home-roster-body');
  if (!db) { body.innerHTML = '<div class="hr-empty">⚠️ אין חיבור למסד הנתונים.</div>'; return; }
  if (rosterBound) { renderHomeRoster(); }
  else { body.innerHTML = '<div class="hr-loading">טוען…</div>'; }
  bindRoster(function(ok) {
    if (!ok) { body.innerHTML = '<div class="hr-empty">⚠️ שגיאה בטעינה.</div>'; return; }
    renderHomeRoster();
  });
}

function renderHomeRoster() {
  var body = document.getElementById('home-roster-body');
  if (!body) return;
  var d = rosterData;
  if (!d.ftos || !d.ftos.length) {
    body.innerHTML = '<div class="hr-empty">הפיקוד עדיין לא הגדיר שיבוצים.</div>';
    return;
  }
  body.innerHTML = d.ftos.map(function(f) {
    var cadets = (d.assignments[f] || []);
    var cadetHtml = cadets.length
      ? '<div class="hr-fto-cadets">' + cadets.map(function(c) {
          var co = cadetObj(c);
          var info = deadlineInfo(co.start);
          var dl = info ? '<span class="hr-dl ' + deadlineClass(info) + '">עד ' + info.text + ' · ' + deadlineLabel(info) + '</span>' : '';
          return '<div class="hr-cadet"><span class="hr-cadet-name">' + esc(co.name) + '</span>' + dl + '</div>';
        }).join('') + '</div>'
      : '<div class="hr-none">אין שיבוץ</div>';
    return '<div class="hr-fto"><div class="hr-fto-name">🎖️ ' + esc(f) + '</div>' + cadetHtml + '</div>';
  }).join('');
}

function buildPortalCards() {
  if (!currentRole) return;
  var portals = PORTALS[currentRole] || [];
  document.getElementById('portal-cards').innerHTML = portals.map(function(p) {
    return '<div class="portal-card" style="--card-color:'+p.color+';--card-glow:'+p.glow+';" onclick="openPortal(this)" data-id="'+(p.id||'')+'" data-name="'+p.name+'" data-file="'+(p.file||'')+'">'+
      '<span class="ci">'+p.icon+'</span>'+
      '<div class="cn" style="color:'+p.color+'">'+p.name+'</div>'+
      '<div class="cd">'+p.desc+'</div>'+
      '</div>';
  }).join('');
}

function openPortal(el) {
  var id = el.getAttribute('data-id');
  var name = el.getAttribute('data-name');
  var file = el.getAttribute('data-file');

  if (id === 'history') {
    if (currentRole !== 'command') return;
    openHistory();
    return;
  }
  if (id === 'roster') {
    if (currentRole !== 'command') return;
    openRoster();
    return;
  }
  showScreen('portal-screen');
  document.getElementById('portal-name').textContent = name;
  document.getElementById('portal-iframe').src = BASE + file;
}

// ── HISTORY (command only) ────────────────────────────────────────────────────
function openHistory() {
  showScreen('history-screen');
  if (histLoaded) { renderHistory(); return; }

  if (!db) {
    document.getElementById('hist-body').innerHTML =
      '<div class="hist-empty">⚠️ אין חיבור למסד הנתונים.</div>';
    return;
  }

  db.collection('submissions').orderBy('ts', 'desc').limit(500)
    .onSnapshot(function(snap) {
      histData = [];
      snap.forEach(function(doc) { histData.push(doc.data()); });
      histLoaded = true;
      renderHistory();
    }, function(err) {
      document.getElementById('hist-body').innerHTML =
        '<div class="hist-empty">⚠️ שגיאה בטעינה: ' + err.message + '</div>';
    });
}

function setHistType(t) {
  histType = t;
  document.querySelectorAll('.hist-tab').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-t') === t);
  });
  renderHistory();
}

function esc(v) {
  return String(v == null ? '' : v).replace(/[&<>"]/g, function(c) {
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[c];
  });
}

function renderHistory() {
  var q = (document.getElementById('hist-search').value || '').trim().toLowerCase();

  var rows = histData.filter(function(r) {
    if (histType !== 'all' && r.type !== histType) return false;
    if (!q) return true;
    return (String(r.subject || '').toLowerCase().indexOf(q) !== -1) ||
           (String(r.examiner || '').toLowerCase().indexOf(q) !== -1);
  });

  // Stats
  var total = rows.length;
  var passed = rows.filter(function(r) { return r.passed; }).length;
  var avg = total ? Math.round(rows.reduce(function(a, r) {
    return a + (Number(r.score) || 0);
  }, 0) / total) : 0;

  document.getElementById('hist-stats').innerHTML =
    '<div class="hist-stat"><span class="hs-n">' + total + '</span><span class="hs-l">הגשות</span></div>' +
    '<div class="hist-stat"><span class="hs-n" style="color:#34d399">' + passed + '</span><span class="hs-l">עברו</span></div>' +
    '<div class="hist-stat"><span class="hs-n" style="color:#f87171">' + (total - passed) + '</span><span class="hs-l">נכשלו</span></div>' +
    '<div class="hist-stat"><span class="hs-n">' + avg + '%</span><span class="hs-l">ממוצע</span></div>';

  var body = document.getElementById('hist-body');
  if (!rows.length) {
    body.innerHTML = '<div class="hist-empty">' +
      (histData.length ? 'לא נמצאו תוצאות מתאימות' : 'עדיין אין הגשות. דוחות חדשים יופיעו כאן אוטומטית.') +
      '</div>';
    return;
  }

  histFiltered = rows;
  body.innerHTML = rows.map(function(r, idx) {
    var m = TYPE_META[r.type] || { icon:'📄', label:r.type||'', subjLabel:'שם', byLabel:'מגיש' };
    var sc = Number(r.score) || 0;
    var col = r.passed ? '#34d399' : '#f87171';
    var d = '';
    try {
      d = new Date(r.createdAt).toLocaleString('he-IL', {
        day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit'
      });
    } catch(e) {}

    return '<div class="hist-row" onclick="openDetail(' + idx + ')">' +
      '<span class="hr-type" title="' + esc(m.label) + '">' + m.icon + '</span>' +
      '<div class="hr-main">' +
        '<div class="hr-name">' + esc(r.subject || '—') + '</div>' +
        '<div class="hr-meta">' + esc(m.label) +
          (r.examiner ? ' • ' + esc(m.byLabel) + ': ' + esc(r.examiner) : '') + '</div>' +
      '</div>' +
      '<span class="hist-date hr-date">' + esc(d) + '</span>' +
      '<span class="hr-score" style="color:' + col + '">' + sc + '%</span>' +
      '<span class="hr-badge ' + (r.passed ? 'hr-pass' : 'hr-fail') + '">' +
        (r.passed ? '✅ עבר' : '❌ נכשל') + '</span>' +
    '</div>';
  }).join('');
}

function closePortal() {
  showRoleScreen();
  document.getElementById('portal-iframe').src = '';
}

// ── MOUSE GLOW ────────────────────────────────────────────────────────────────
(function() {
  var c = document.getElementById('glow-canvas');
  if (!c) return;
  var x = c.getContext('2d'), mx = -500, my = -500;
  function r(){ c.width = innerWidth; c.height = innerHeight; }
  r(); addEventListener('resize', r);
  addEventListener('mousemove', function(e){ mx = e.clientX; my = e.clientY; });
  (function draw(){
    x.clearRect(0,0,c.width,c.height);
    var g = x.createRadialGradient(mx,my,0,mx,my,150);
    g.addColorStop(0,'rgba(79,142,247,0.06)'); g.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle = g; x.fillRect(0,0,c.width,c.height);
    requestAnimationFrame(draw);
  })();
})();



// ── DETAIL MODAL ──────────────────────────────────────────────────────────────
function closeDetail(e) {
  if (e && e.target && e.target.id !== 'det-overlay' && e.type === 'click' && e.currentTarget !== e.target) return;
  document.getElementById('det-overlay').classList.remove('open');
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') document.getElementById('det-overlay').classList.remove('open');
});

function openDetail(idx) {
  var r = histFiltered[idx];
  if (!r) return;
  var m = TYPE_META[r.type] || { icon:'📄', label:r.type||'', byLabel:'מגיש' };

  document.getElementById('det-title').textContent = m.icon + ' ' + (r.subject || '—');

  var d = '';
  try {
    d = new Date(r.createdAt).toLocaleString('he-IL', {
      day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit'
    });
  } catch(e) {}
  var sub = m.label;
  if (r.examiner) sub += ' • ' + m.byLabel + ': ' + r.examiner;
  if (r.phase)    sub += ' • ' + r.phase;
  if (d)          sub += ' • ' + d;
  if (r.timeTaken) sub += ' • ⏱ ' + r.timeTaken;
  document.getElementById('det-sub').textContent = sub;

  var sc = document.getElementById('det-score');
  sc.textContent = (Number(r.score) || 0) + '%';
  sc.style.color = r.passed ? '#34d399' : '#f87171';

  var html = '';

  if (r.criticalFail) {
    html += '<div class="det-q bad"><div class="det-q-top">' +
            '<span class="det-q-txt">⛔ פסילה אוטומטית — כשל בנוהל פתיחה בירי</span></div></div>';
  }

  // prrp_pd: sections of criteria
  if (r.sections && r.sections.length) {
    r.sections.forEach(function(sec) {
      html += '<div class="det-sec"><div class="det-sec-h">' + esc(sec.title) + '</div>';
      (sec.items || []).forEach(function(it) {
        var cls = it.score === 'v' ? 'ok' : (it.score === 'vx' ? 'mid' : (it.score === 'x' ? 'bad' : ''));
        var tag = it.score === 'v' ? 'tag-ok' : (it.score === 'vx' ? 'tag-mid' : (it.score === 'x' ? 'tag-bad' : 'tag-na'));
        var sym = it.score === 'v' ? '✔' : (it.score === 'vx' ? '◐' : (it.score === 'x' ? '✘' : '—'));
        html += '<div class="det-q ' + cls + '"><div class="det-q-top">' +
                '<span class="det-q-txt">' + esc(it.text) +
                (it.critical ? '<span class="det-crit">קריטי</span>' : '') + '</span>' +
                '<span class="det-q-tag ' + tag + '">' + sym + ' ' + esc(it.scoreLabel) + '</span></div>' +
                (it.note ? '<div class="det-note">📝 ' + esc(it.note) + '</div>' : '') +
                '</div>';
      });
      html += '</div>';
    });
  }

  // fto_exam: questions with given vs correct
  if (r.questions && r.questions.length) {
    html += '<div class="det-sec"><div class="det-sec-h">שאלות ותשובות</div>';
    r.questions.forEach(function(q) {
      var cls = q.ok ? 'ok' : (q.points > 0 ? 'mid' : 'bad');
      var tag = q.ok ? 'tag-ok' : (q.points > 0 ? 'tag-mid' : 'tag-bad');
      html += '<div class="det-q ' + cls + '"><div class="det-q-top">' +
              '<span class="det-q-txt">' + q.number + '. ' + esc(q.question) + '</span>' +
              '<span class="det-q-tag ' + tag + '">' + q.points + '/' + q.maxPoints + '</span></div>';
      if (q.desc) html += '<div class="det-ans"><span class="lbl">' + esc(q.desc) + '</span></div>';
      html += '<div class="det-ans ' + (q.ok ? 'given-ok' : 'given-bad') + '">' +
              '<span class="lbl">תשובתו: </span>' + esc(q.given || 'לא נענה') + '</div>';
      if (!q.ok && q.correct) {
        html += '<div class="det-ans correct"><span class="lbl">התשובה הנכונה: </span>' + esc(q.correct) + '</div>';
      }
      html += '</div>';
    });
    html += '</div>';
  }

  // evaluations: metrics + free text
  if (r.metrics && r.metrics.length) {
    html += '<div class="det-sec"><div class="det-sec-h">מדדים וציונים</div>';
    r.metrics.forEach(function(mt) {
      html += '<div class="det-kv"><span class="k">' + esc(mt.name) + '</span>' +
              '<span class="v">' + esc(mt.value) + '</span></div>';
    });
    html += '</div>';
  }

  if (r.texts && r.texts.length) {
    html += '<div class="det-sec"><div class="det-sec-h">הערכות מילוליות</div>';
    r.texts.forEach(function(t) {
      html += '<div class="det-text"><div class="k">' + esc(t.name) + '</div>' +
              '<div class="v">' + esc(t.value) + '</div></div>';
    });
    html += '</div>';
  }

  if (!html) {
    html = '<div class="det-none">אין פירוט מלא להגשה זו.<br>' +
           'הגשות שנשלחו לפני העדכון שומרות רק ציון וסטטוס.</div>';
  }

  document.getElementById('det-body').innerHTML = html;
  document.getElementById('det-body').scrollTop = 0;
  document.getElementById('det-overlay').classList.add('open');
}



// ── ROSTER ────────────────────────────────────────────────────────────────────
var MAX_PER_FTO = 2;
var rosterData = { ftos: [], assignments: {} };
var rosterBound = false;
var rosterLocalWrite = false;  // suppress echo re-render of editor after our own save

function rosterNormalize(d) {
  d = d || {};
  return {
    ftos: Array.isArray(d.ftos) ? d.ftos : [],
    assignments: (d.assignments && typeof d.assignments === 'object') ? d.assignments : {}
  };
}

function bindRoster(cb) {
  if (!db) { cb(false); return; }
  if (rosterBound) { cb(true); return; }
  db.collection('roster').doc('current').onSnapshot(function(doc) {
    rosterData = rosterNormalize(doc.exists ? doc.data() : {});
    var first = !rosterBound;
    rosterBound = true;
    if (first) { cb(true); }
    else { refreshRosterUI(); }  // live update on later changes
  }, function(err) {
    console.warn('roster load error', err);
    cb(false);
  });
}

// Refresh whichever roster UI is currently on screen (live updates)
function refreshRosterUI() {
  // Read-only home panel: always safe to refresh.
  var roleScreen = document.getElementById('role-screen');
  if (roleScreen && roleScreen.style.display !== 'none' && roleScreen.classList.contains('with-roster')) {
    renderHomeRoster();
  }
  // Editor: if this snapshot is the echo of our OWN save, don't rebuild —
  // the editor already shows the fresh data and a rebuild would wipe in-progress inputs.
  var rosterScreen = document.getElementById('roster-screen');
  if (rosterScreen && rosterScreen.style.display !== 'none') {
    if (rosterLocalWrite) { rosterLocalWrite = false; }
    else { renderRoster(); }  // genuine remote change from another device
  }
}

function saveRoster() {
  if (!db) return;
  rosterLocalWrite = true;  // our own change; ignore the snapshot echo for the editor
  var st = document.getElementById('roster-save-state');
  if (st) { st.textContent = 'שומר…'; st.className = 'roster-save saving'; }
  db.collection('roster').doc('current').set(rosterData).then(function() {
    if (st) { st.textContent = '✓ נשמר'; st.className = 'roster-save saved';
      setTimeout(function(){ if(st.textContent==='✓ נשמר'){ st.textContent=''; st.className='roster-save'; } }, 1800); }
  }).catch(function(e) {
    if (st) { st.textContent = '⚠️ שגיאה בשמירה'; st.className = 'roster-save'; }
    console.warn('roster save failed', e);
  });
}

// clean assignments: drop unknown ftos, cap at MAX
function cadetObj(c) {
  if (c && typeof c === 'object') return { name: c.name || '', start: c.start || '' };
  return { name: String(c || ''), start: '' };
}
function cadetName(c) { return cadetObj(c).name; }

function deadlineInfo(start) {
  if (!start) return null;
  var d = new Date(start + 'T00:00:00');
  if (isNaN(d.getTime())) return null;
  var dl = new Date(d.getTime());
  dl.setDate(dl.getDate() + 3);
  var today = new Date(); today.setHours(0,0,0,0);
  var dlMid = new Date(dl.getTime()); dlMid.setHours(0,0,0,0);
  var days = Math.round((dlMid - today) / 86400000);
  var dd = String(dl.getDate()).padStart(2,'0');
  var mm = String(dl.getMonth()+1).padStart(2,'0');
  return { text: dd + '/' + mm, days: days };
}
function deadlineLabel(info) {
  if (!info) return '';
  if (info.days < 0)  return 'עבר ב-' + Math.abs(info.days) + ' ימים';
  if (info.days === 0) return 'היום!';
  if (info.days === 1) return 'מחר';
  return 'בעוד ' + info.days + ' ימים';
}
function deadlineClass(info) {
  if (!info) return '';
  if (info.days < 0)  return 'dl-over';
  if (info.days <= 1) return 'dl-soon';
  return 'dl-ok';
}

function cleanAssignments() {
  var a = {};
  rosterData.ftos.forEach(function(f) {
    a[f] = (rosterData.assignments[f] || []).slice(0, MAX_PER_FTO);
  });
  rosterData.assignments = a;
}

// ---- Roster views ----
function openRoster() { openRosterView(true); }
function openMyRoster() { openRosterView(false); }

function openRosterView(editable) {
  showScreen('roster-screen');
  document.getElementById('roster-title').textContent = editable ? '🗂️ ניהול רוסטר' : '🗂️ רוסטר שיבוצים';
  document.getElementById('roster-save-state').textContent = '';
  var body = document.getElementById('roster-body');
  if (!db) { body.innerHTML = '<div class="hist-empty">⚠️ אין חיבור למסד הנתונים.</div>'; return; }
  body.innerHTML = '<div class="hist-empty">טוען…</div>';
  window._rosterEditable = editable;
  bindRoster(function(ok) {
    if (!ok) { body.innerHTML = '<div class="hist-empty">⚠️ שגיאה בטעינת הרוסטר.</div>'; return; }
    renderRoster();
  });
}

function renderRoster() {
  var editable = !!window._rosterEditable;
  cleanAssignments();
  var d = rosterData;
  var body = document.getElementById('roster-body');

  // Preserve any half-typed cadet name/date + the "add manager" field across the rebuild,
  // so adding a manager or a live update doesn't wipe what you were typing.
  var carry = { add: '', inputs: {} };
  if (editable) {
    var addEl = document.getElementById('add-fto');
    if (addEl) carry.add = addEl.value || '';
    d.ftos.forEach(function(f, i) {
      var nameEl = document.getElementById('cadet-in-' + i);
      var dateEl = document.getElementById('cadet-date-' + i);
      if ((nameEl && nameEl.value) || (dateEl && dateEl.value)) {
        carry.inputs[f] = { name: nameEl ? nameEl.value : '', date: dateEl ? dateEl.value : '' };
      }
    });
  }

  var assignRows = d.ftos.length ? d.ftos.map(function(f, i) {
    var slots = d.assignments[f] || [];
    var slotHtml = slots.map(function(c, si) {
      var co = cadetObj(c);
      var info = deadlineInfo(co.start);
      var dlHtml = info ? '<span class="dl-badge ' + deadlineClass(info) + '">עד ' + info.text + ' · ' + deadlineLabel(info) + '</span>' : '';
      var dateCtrl = editable
        ? '<input type="date" class="slot-date" value="' + esc(co.start) + '" onchange="setCadetDate(\'' + jsq(f) + '\',' + si + ',this.value)">'
        : '';
      return '<div class="slot slot-block">' +
        '<div class="slot-top"><span class="slot-name">' + esc(co.name) + '</span>' +
        (editable ? '<button class="sx" onclick="unassign(\'' + jsq(f) + '\',' + si + ')">✕</button>' : '') +
        '</div>' +
        (info || editable ? '<div class="slot-meta">' + dateCtrl + dlHtml + '</div>' : '') +
        '</div>';
    }).join('');
    if (editable) {
      if (slots.length < MAX_PER_FTO) {
        slotHtml += '<div class="slot-input"><input id="cadet-in-' + i + '" placeholder="שם חניך…" ' +
          'onkeydown="if(event.key===\'Enter\')assign(\'' + jsq(f) + '\',' + i + ')">' +
          '<input type="date" id="cadet-date-' + i + '" class="slot-date" title="תאריך התחלה">' +
          '<button class="slot-go" onclick="assign(\'' + jsq(f) + '\',' + i + ')">+</button></div>';
      } else {
        slotHtml += '<span class="slot-full">מלא (' + MAX_PER_FTO + ')</span>';
      }
    } else if (!slots.length) {
      slotHtml = '<span class="slot-full">— אין שיבוץ —</span>';
    }

    var ftoNameHtml = editable
      ? '<div class="fto-name-row">' +
          '<button class="fto-del-x" title="הסר מדריך" onclick="removeFto(\'' + jsq(f) + '\')">✕</button>' +
          '<input class="fto-name-edit" value="' + esc(f) + '" ' +
          'onchange="renameFto(\'' + jsq(f) + '\', this.value)" ' +
          'onkeydown="if(event.key===\'Enter\')this.blur()">' +
        '</div>'
      : '<div class="afn">🎖️ ' + esc(f) + '</div>';

    return '<div class="assign-row">' +
      '<div class="assign-fto">' + ftoNameHtml +
        '<div class="afc">' + slots.length + ' מתוך ' + MAX_PER_FTO + ' חניכים</div>' +
      '</div>' +
      '<div class="assign-slots">' + slotHtml + '</div></div>';
  }).join('') : '<div class="roster-empty-col">' +
      (editable ? 'הוסף מדריכים כדי להתחיל לשבץ.' : 'הפיקוד עדיין לא הגדיר שיבוצים.') + '</div>';

  var html = '';

  if (editable) {
    html +=
      '<div class="roster-topbar">' +
        '<div class="name-add name-add-wide">' +
          '<input id="add-fto" placeholder="שם מדריך חדש…" onkeydown="if(event.key===\'Enter\')addFto()">' +
          '<button onclick="addFto()">+ הוסף מדריך</button>' +
        '</div>' +
        '<span class="roster-count">' + d.ftos.length + ' מדריכים</span>' +
      '</div>';
  }

  html +=
    '<div class="assign-h">📋 מי מלמד את מי</div>' +
    '<div class="assign-table">' + assignRows + '</div>';

  body.innerHTML = html;

  // Restore carried input values
  if (editable) {
    var addEl2 = document.getElementById('add-fto');
    if (addEl2 && carry.add) addEl2.value = carry.add;
    d.ftos.forEach(function(f, i) {
      var saved = carry.inputs[f];
      if (!saved) return;
      var nameEl = document.getElementById('cadet-in-' + i);
      var dateEl = document.getElementById('cadet-date-' + i);
      if (nameEl && saved.name) nameEl.value = saved.name;
      if (dateEl && saved.date) dateEl.value = saved.date;
    });
  }
}

function jsq(v) { return String(v).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function addFto() {
  var el = document.getElementById('add-fto');
  var v = (el.value || '').trim();
  if (!v) return;
  if (rosterData.ftos.indexOf(v) !== -1) { el.value=''; return; }
  rosterData.ftos.push(v);
  if (!rosterData.assignments[v]) rosterData.assignments[v] = [];
  saveRoster(); renderRoster();
}

function renameFto(oldName, newName) {
  newName = (newName || '').trim();
  if (!newName || newName === oldName) { renderRoster(); return; }
  if (rosterData.ftos.indexOf(newName) !== -1) {
    alert('כבר קיים מדריך בשם הזה.');
    renderRoster(); return;
  }
  rosterData.ftos = rosterData.ftos.map(function(x){ return x === oldName ? newName : x; });
  rosterData.assignments[newName] = rosterData.assignments[oldName] || [];
  if (oldName !== newName) delete rosterData.assignments[oldName];
  saveRoster(); renderRoster();
}

function removeFto(f) {
  if (!confirm('להסיר את המדריך "' + f + '"? השיבוצים שלו יימחקו.')) return;
  rosterData.ftos = rosterData.ftos.filter(function(x){ return x !== f; });
  delete rosterData.assignments[f];
  saveRoster(); renderRoster();
}

function assign(fto, inputIdx) {
  var nameEl = document.getElementById('cadet-in-' + inputIdx);
  var dateEl = document.getElementById('cadet-date-' + inputIdx);
  var name = nameEl ? (nameEl.value || '').trim() : '';
  var start = dateEl ? (dateEl.value || '') : '';
  if (!name) { if (nameEl) nameEl.focus(); return; }
  if (!rosterData.assignments[fto]) rosterData.assignments[fto] = [];
  if (rosterData.assignments[fto].length >= MAX_PER_FTO) return;
  rosterData.assignments[fto].push({ name: name, start: start });
  saveRoster(); renderRoster();
}

function setCadetDate(fto, slotIdx, value) {
  var list = rosterData.assignments[fto];
  if (!list || !list[slotIdx]) return;
  list[slotIdx] = { name: cadetName(list[slotIdx]), start: value || '' };
  saveRoster(); renderRoster();
}

function unassign(fto, slotIdx) {
  var list = rosterData.assignments[fto] || [];
  list.splice(slotIdx, 1);
  rosterData.assignments[fto] = list;
  saveRoster(); renderRoster();
}
