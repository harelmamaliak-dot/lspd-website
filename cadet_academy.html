  body {
    font-family: 'Heebo', sans-serif; background: var(--navy-deep);
    color: var(--text-primary); height: 100vh; overflow: hidden;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(30,77,140,0.25) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(26,58,107,0.2) 0%, transparent 50%),
      repeating-linear-gradient(-45deg, transparent, transparent 18px, rgba(165,148,249,0.06) 18px, rgba(165,148,249,0.06) 19px),
      repeating-linear-gradient(45deg, transparent, transparent 18px, rgba(124,111,205,0.04) 18px, rgba(124,111,205,0.04) 19px);
  }
  header {
    padding: 16px 32px; background: rgba(10,22,40,0.9); border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-family: 'Rajdhani',sans-serif; font-size: 1.5rem; font-weight: 700; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; }
  header p { font-size: 0.72rem; color: var(--text-muted); letter-spacing: 1px; text-align: center; margin-top: 2px; }

  /* Screens */
  .screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: calc(100vh - 77px); padding: 20px; position: relative; overflow: hidden; }
  .screen.active { display: flex; }
  .screen::before { content: '🛡️'; position: absolute; font-size: 420px; opacity: 0.025; top: 50%; left: 50%; transform: translate(-50%,-55%); pointer-events: none; z-index: 0; }

  /* Role screen */
  #role-screen { background: #222; }
  #role-screen .screen-title { font-family: 'Rajdhani',sans-serif; font-size: 2rem; color: #f0f0f0; text-align: center; margin-bottom: 8px; position: relative; z-index: 1; }
  #role-screen .screen-sub { font-size: 0.8rem; color: #888; letter-spacing: 3px; text-transform: uppercase; text-align: center; margin-bottom: 4px; position: relative; z-index: 1; }

  /* Category screen */
  #category-screen { background: var(--navy-deep); }
  .back-btn {
    position: absolute; top: 16px; left: 16px; z-index: 10;
    background: rgba(124,111,205,0.15); border: 1px solid var(--border-bright);
    border-radius: 20px; padding: 6px 14px; color: var(--gold);
    font-family: 'Heebo',sans-serif; font-size: 0.78rem; cursor: pointer; transition: all 0.2s;
  }
  .back-btn:hover { background: rgba(124,111,205,0.3); }

  /* Divider */
  .divider { width: 60px; height: 2px; background: linear-gradient(90deg,transparent,var(--gold),transparent); margin: 10px auto 28px; position: relative; z-index: 1; }

  /* Cards */
  .cards-grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; position: relative; z-index: 1; max-width: 1100px; }
  .card {
    border-radius: 14px; padding: 32px 24px; width: 200px; text-align: center;
    cursor: pointer; transition: all 0.25s ease; position: relative; overflow: hidden;
    border: 1px solid var(--border);
  }
  .card::before { content: ''; position: absolute; top: 0; left: 10%; width: 80%; height: 2px; background: linear-gradient(90deg,transparent,var(--card-color,#a594f9),transparent); opacity: 0; transition: opacity 0.25s; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 0 24px var(--card-glow,rgba(165,148,249,0.3)), 0 8px 28px rgba(0,0,0,0.4); border-color: var(--card-color,#a594f9); }
  .card:hover::before { opacity: 1; }
  .card .card-icon { font-size: 2.8rem; margin-bottom: 12px; display: block; transition: transform 0.2s; }
  .card:hover .card-icon { transform: scale(1.15) rotate(-5deg); }
  .card .card-name { font-family: 'Rajdhani',sans-serif; font-size: 1.15rem; font-weight: 700; letter-spacing: 1px; }
  .card .card-desc { font-size: 0.7rem; color: var(--text-muted); margin-top: 5px; }

  /* Role cards */
  .role-card.cadet { background: linear-gradient(135deg,#0c2a3f,#0a3d5c); border-color: #38bdf8; --card-color:#38bdf8; --card-glow:rgba(56,189,248,0.3); }
  .role-card.cadet .card-name { color: #7dd3fc; }
  .role-card.fto { background: linear-gradient(135deg,#1a0d3a,#260d52); border-color: #a594f9; --card-color:#a594f9; --card-glow:rgba(165,148,249,0.3); }
  .role-card.fto .card-name { color: #c4b5fd; }
  .role-card.command { background: linear-gradient(135deg,#2e1500,#3d1e00); border-color: #fb923c; --card-color:#fb923c; --card-glow:rgba(251,146,60,0.3); }
  .role-card.command .card-name { color: #fdba74; }
  .role-card.high-command { background: linear-gradient(135deg,#2e0000,#3d0000); border-color: #f87171; --card-color:#f87171; --card-glow:rgba(248,113,113,0.3); }
  .role-card.high-command .card-name { color: #fca5a5; }

  /* Portal screen */
  #portal-screen { padding: 0; justify-content: flex-start; overflow: hidden; }
  .portal-bar { display: flex; align-items: center; gap: 10px; padding: 8px 16px; background: var(--navy-light); border-bottom: 1px solid var(--border); width: 100%; flex-shrink: 0; }
  .portal-bar-btn { background: rgba(124,111,205,0.2); border: 1px solid var(--border-bright); border-radius: 6px; padding: 5px 14px; color: var(--gold); cursor: pointer; font-family: 'Heebo',sans-serif; font-size: 0.8rem; transition: all 0.2s; }
  .portal-bar-btn:hover { background: rgba(124,111,205,0.35); }
  .portal-iframe { flex: 1; border: none; width: 100%; height: calc(100vh - 77px - 40px); }

  #glow-canvas { position: fixed; inset: 0; pointer-events: none; z-index: -1; }
</style>
</head>
<body>
<canvas id="glow-canvas"></canvas>

<header>
  <div style="text-align:center;">
    <h1>FTO Website</h1>
    <p>Patrol unit</p>
  </div>
</header>

<!-- ROLE SCREEN -->
<div class="screen active" id="role-screen">
  <div style="position:relative;z-index:1;text-align:center;">
    <p class="screen-sub">ברוך הבא</p>
    <h2 class="screen-title">בחר את <span style="color:var(--gold);">הדרגה שלך</span></h2>
    <div class="divider"></div>
  </div>
  <div class="cards-grid">
    <div class="card role-card cadet" onclick="selectRole('cadet')">
      <span class="card-icon">🎓</span>
      <div class="card-name">קאדט</div>
      <div class="card-desc">גישה לנהלים ולומד</div>
    </div>
    <div class="card role-card fto" onclick="selectRole('fto')">
      <span class="card-icon">🚔</span>
      <div class="card-name">שוטר / FTO</div>
      <div class="card-desc">מערכות FTO</div>
    </div>
    <div class="card role-card command" onclick="selectRole('command')">
      <span class="card-icon">⭐</span>
      <div class="card-name">פיקוד</div>
      <div class="card-desc">רוסטר + כלי ניהול</div>
    </div>
    <div class="card role-card high-command" onclick="selectRole('high_command')">
      <span class="card-icon">🔴</span>
      <div class="card-name">פיקוד גבוה</div>
      <div class="card-desc">גישה מלאה</div>
    </div>
  </div>
</div>

<!-- CATEGORY SCREEN -->
<div class="screen" id="category-screen">
  <button class="back-btn" onclick="goBack()">← חזור לדרגות</button>
  <div style="position:relative;z-index:1;text-align:center;">
    <p class="screen-sub" id="cat-role-label">FTO</p>
    <h2 style="font-family:'Rajdhani',sans-serif;font-size:2rem;color:var(--text-primary);margin-bottom:8px;">בחר <span style="color:var(--gold);">קטגוריה</span></h2>
    <div class="divider"></div>
  </div>
  <div class="cards-grid" id="cat-cards"></div>
</div>

<!-- PORTAL SCREEN -->
<div class="screen" id="portal-screen">
  <div class="portal-bar">
    <button class="portal-bar-btn" onclick="closePortal()">← חזור</button>
    <span id="portal-label" style="color:var(--text-muted);font-size:0.8rem;"></span>
  </div>
  <iframe class="portal-iframe" id="portal-iframe" src=""></iframe>
</div>

function selectRole(role) {
  currentRole = role;
  playClick();
  document.getElementById('role-screen').classList.remove('active');
  document.getElementById('cat-role-label').textContent = roleLabels[role] || role;
  var cats = CATEGORIES[role] || [];
  var grid = document.getElementById('cat-cards');
  grid.innerHTML = cats.map(function(c) {
    return '<div class="card" style="background:' + c.bg + ';border-color:' + c.color + ';--card-color:' + c.color + ';--card-glow:' + c.glow + ';" onclick="openPortal(\'' + c.id + '\',\'' + c.name + '\')">'

      + '<div class="card-name" style="color:' + c.color + ';">' + c.name + '</div>'
      + '<div class="card-desc">' + c.desc + '</div>'
      + '</div>';
  }).join('');
  attachCardEffects();
  document.getElementById('category-screen').classList.add('active');
}

function goBack() {
  document.getElementById('category-screen').classList.remove('active');
  document.getElementById('role-screen').classList.add('active');
}

    'cadet-exam-screen': 'lspd_fto_evaluation_portal.html'
  };
  var file = fileMap[id];
  if (!file) return;
  document.getElementById('category-screen').classList.remove('active');
  document.getElementById('portal-label').textContent = title;
  document.getElementById('portal-iframe').src = file;
  document.getElementById('portal-screen').classList.add('active');
}

function closePortal() {
  document.getElementById('portal-screen').classList.remove('active');
  document.getElementById('portal-iframe').src = '';
  document.getElementById('category-screen').classList.add('active');
}

function attachCardEffects() {
  document.querySelectorAll('.card').forEach(function(card) {
    card.onmouseenter = function() { var i=card.querySelector('.card-icon'); if(i) i.style.transform='scale(1.2) rotate(-5deg)'; };
    card.onmouseleave = function() { var i=card.querySelector('.card-icon'); if(i) i.style.transform='scale(1) rotate(0deg)'; };
    card.onmousedown = playClick;
  });
}
attachCardEffects();

function playClick() {
  try {
    var ctx=new(window.AudioContext||window.webkitAudioContext)(),t=ctx.currentTime;
    var b=ctx.createBuffer(1,Math.floor(ctx.sampleRate*.008),ctx.sampleRate);
    var d=b.getChannelData(0);
    for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*.001));
    var s=ctx.createBufferSource(); s.buffer=b;
    var g=ctx.createGain(); g.gain.setValueAtTime(.35,t); g.gain.exponentialRampToValueAtTime(.001,t+.008);
    s.connect(g); g.connect(ctx.destination); s.start(t);
  } catch(e) {}
}

// Mouse glow
(function() {
  var c=document.getElementById('glow-canvas');
  if(!c) return;
  var x=c.getContext('2d'),mx=-500,my=-500,tx=-500,ty=-500;
  function r(){ c.width=innerWidth; c.height=innerHeight; }
  r(); addEventListener('resize',r);
  addEventListener('mousemove',function(e){ tx=e.clientX; ty=e.clientY; mx=tx; my=ty; });
  (function draw(){
    mx+=(tx-mx)*.95; my+=(ty-my)*.95;
    x.clearRect(0,0,c.width,c.height);
    var g=x.createRadialGradient(mx,my,0,mx,my,120);
    g.addColorStop(0,'rgba(220,230,255,.18)'); g.addColorStop(.4,'rgba(165,148,249,.07)'); g.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=g; x.fillRect(0,0,c.width,c.height);
    requestAnimationFrame(draw);
  })();
})();
</script>
